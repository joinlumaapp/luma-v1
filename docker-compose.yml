# LUMA V1 — Development Environment
# Usage: docker compose up -d

services:
  # ─── PostgreSQL Database ─────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: luma-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: luma
      POSTGRES_PASSWORD: luma_dev_2024
      POSTGRES_DB: luma_dev
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "effective_cache_size=256MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "log_min_duration_statement=500"
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U luma -d luma_dev']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - luma-network

  # ─── Redis Cache ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: luma-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - luma-network

  # ─── Elasticsearch (Discovery Search) ────────────
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: luma-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - 'ES_JAVA_OPTS=-Xms256m -Xmx256m'
    ports:
      - '9200:9200'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:9200/_cluster/health | grep -q "status"']
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - luma-network

  # ─── Backend API (Development) ───────────────────
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: builder
    container_name: luma-backend
    restart: unless-stopped
    working_dir: /app
    command: npx nest start --watch
    ports:
      - '3000:3000'
      - '9229:9229'
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://luma:luma_dev_2024@postgres:5432/luma_dev?connection_limit=10&pool_timeout=10
      REDIS_URL: redis://redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      JWT_SECRET: luma-jwt-secret-dev-key-change-in-production-2024
      JWT_REFRESH_SECRET: luma-jwt-refresh-secret-dev-key-change-in-production-2024
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      JWT_REFRESH_EXPIRY_DAYS: '7'
    volumes:
      - ./apps/backend/src:/app/apps/backend/src:delegated
      - ./packages/shared/src:/app/packages/shared/src:delegated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/api/v1/health/ping']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s
    networks:
      - luma-network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

networks:
  luma-network:
    driver: bridge

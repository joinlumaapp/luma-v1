# ─────────────────────────────────────────────────────────
# LUMA V1 — Production Docker Compose Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file overrides the base docker-compose.yml for production-like
# environments. It removes dev volume mounts, adds resource limits,
# and configures proper restart/logging policies.
# ─────────────────────────────────────────────────────────

services:
  # ─── PostgreSQL — Production Overrides ───────────────
  postgres:
    restart: always
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ─── Redis — Production Overrides ────────────────────
  redis:
    restart: always
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --tcp-backlog 511
      --timeout 300
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Elasticsearch — Production Overrides ────────────
  elasticsearch:
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ─── Backend — Production Overrides ──────────────────
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: production
    command: []  # Use the CMD from Dockerfile (node apps/backend/dist/main.js)
    restart: always
    ports:
      - '3000:3000'
      # No debug port exposed in production
    environment:
      NODE_ENV: production
      PORT: 3000
    env_file:
      - .env.production
    # No volume mounts in production — built code is baked into the image
    volumes: []
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      replicas: 2
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"
        tag: "luma-backend"
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/api/v1/health/ping']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

# ─────────────────────────────────────────────────────────────
# LUMA V1 — Release Pipeline
# Triggered when a version tag (v*) is pushed.
# Validates the build, runs tests, and creates a GitHub Release.
# Optimized: better changelog, asset attachment for build artifacts.
# ─────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

permissions:
  contents: write

jobs:
  # ── Validate & Test ────────────────────────────────────
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Validate tag matches package.json version
        run: |
          TAG="${{ github.ref_name }}"
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          TAG_VERSION="${TAG#v}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "WARNING: Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            echo "Consider updating package.json before the next release."
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run shared:build

      - name: Generate Prisma client
        run: cd apps/backend && npx prisma generate

      - name: Prisma schema validation
        run: cd apps/backend && npx prisma validate

      - name: Shared — Type Check
        run: npx tsc --noEmit --project packages/shared/tsconfig.json

      - name: Backend — Type Check
        run: npx tsc --noEmit --project apps/backend/tsconfig.json

      - name: Mobile — Type Check
        run: npx tsc --noEmit --project apps/mobile/tsconfig.json

      - name: Backend — Unit Tests
        run: npx jest --forceExit --ci --passWithNoTests
        working-directory: apps/backend
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret
          JWT_ACCESS_EXPIRY: 15m
          JWT_REFRESH_EXPIRY: 7d
          JWT_REFRESH_EXPIRY_DAYS: '7'

      - name: Backend — Build
        run: npm run build
        working-directory: apps/backend

      - name: Verify build output
        run: |
          test -f packages/shared/dist/index.js || (echo "ERROR: Shared build missing" && exit 1)
          test -d apps/backend/dist || (echo "ERROR: Backend build missing" && exit 1)

  # ── Create GitHub Release ──────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            echo "Previous tag: $PREV_TAG"
            CHANGES=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD --no-merges)
          else
            echo "No previous tag found, using all commits"
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi

          # Count stats
          COMMIT_COUNT=$(echo "$CHANGES" | wc -l)
          FILES_CHANGED=$(git diff --stat "$PREV_TAG"..HEAD 2>/dev/null | tail -1 || echo "N/A")

          # Categorize changes
          FEATURES=$(echo "$CHANGES" | grep -iE "^- (feat|add|new)" || echo "")
          FIXES=$(echo "$CHANGES" | grep -iE "^- (fix|bug|patch|hotfix)" || echo "")
          OTHER=$(echo "$CHANGES" | grep -viE "^- (feat|add|new|fix|bug|patch|hotfix)" || echo "")

          {
            echo "body<<DELIMITER"
            echo "## LUMA ${{ github.ref_name }}"
            echo ""
            echo "### Release Stats"
            echo "- **Commits**: $COMMIT_COUNT"
            echo "- **Changes**: $FILES_CHANGED"
            echo ""
            if [ -n "$FEATURES" ]; then
              echo "### New Features"
              echo "$FEATURES"
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi
            if [ -n "$OTHER" ]; then
              echo "### Other Changes"
              echo "$OTHER"
              echo ""
            fi
            echo "### Verification"
            echo "- Shared types: Passed"
            echo "- Backend type check: Passed"
            echo "- Mobile type check: Passed"
            echo "- Backend unit tests: Passed"
            echo "- Backend build: Passed"
            echo "- Prisma schema: Valid"
            echo "DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Determine prerelease
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if echo "$TAG" | grep -qE '(alpha|beta|rc|canary)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LUMA ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

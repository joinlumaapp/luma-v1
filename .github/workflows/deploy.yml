      - name: Deployment summary
        run: |
          echo "=========================================="
          echo " LUMA Backend — Deployment Summary"
          echo "=========================================="
          echo "Environment : ${{ github.event.inputs.environment || 'staging' }}"
          echo "Image Tag   : ${{ needs.build-and-push.outputs.image-tag }}"
          echo "Image Digest: ${{ needs.build-and-push.outputs.image-digest }}"
          echo "Commit      : ${{ github.sha }}"
          echo "=========================================="
          echo ""
          echo "NOTE: ECS deployment steps are commented out."
          echo "Uncomment them once infrastructure is provisioned."


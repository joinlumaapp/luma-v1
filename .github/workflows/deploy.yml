# ─────────────────────────────────────────────────────────────
# LUMA V1 — CD Pipeline (Deploy)
# Builds Docker image and deploys to AWS after CI passes on main.
# Production deployments require manual approval.
# ─────────────────────────────────────────────────────────────
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  # ── AWS Configuration (set these as GitHub repository secrets) ──
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: luma-backend

jobs:
  # ── Determine environment ───────────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      is_production: ${{ steps.env.outputs.is_production }}
    steps:
      - name: Determine target environment
        id: env
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          if [ "$ENV" = "production" ]; then
            echo "is_production=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_production=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Wait for CI to pass ──────────────────────────────────
  ci-check:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Wait for CI workflow
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: 'Build Verification'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15

  # ── Build & Push Docker Image ────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [ci-check, prepare]
    environment: ${{ needs.prepare.outputs.environment }}
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build-push.outputs.digest }}
      short-sha: ${{ steps.meta.outputs.short_sha }}
      full-image: ${{ steps.meta.outputs.full_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          ENV="${{ needs.prepare.outputs.environment }}"
          TAG="${ENV}-${SHORT_SHA}-${TIMESTAMP}"
          echo "tags=$TAG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

      # ── AWS Credentials ──────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set full image URI
        id: image-uri
        run: |
          echo "full_image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tags }}" >> "$GITHUB_OUTPUT"

      # ── Docker Build & Push ──────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          target: production
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tags }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.prepare.outputs.environment }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Database Migration ──────────────────────────────────
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-and-push, prepare]
    environment: ${{ needs.prepare.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations
        run: npx prisma migrate deploy --schema=apps/backend/src/prisma/schema.prisma
        working-directory: apps/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Deploy to ECS ────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-and-push, migrate, prepare]
    environment: ${{ needs.prepare.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── ECS Task Definition Update ──────────────────────
      - name: Set ECS resource names
        id: ecs-names
        run: |
          ENV="${{ needs.prepare.outputs.environment }}"
          echo "cluster=luma-${ENV}" >> "$GITHUB_OUTPUT"
          echo "service=luma-${ENV}-backend" >> "$GITHUB_OUTPUT"
          echo "task_definition=luma-${ENV}-backend" >> "$GITHUB_OUTPUT"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ steps.ecs-names.outputs.task_definition }} \
            --query 'taskDefinition' \
            --output json > task-definition.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: luma-backend
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.build-and-push.outputs.image-tag }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ steps.ecs-names.outputs.service }}
          cluster: ${{ steps.ecs-names.outputs.cluster }}
          wait-for-service-stability: true
          wait-for-minutes: 10

  # ── Post-Deploy Health Check ─────────────────────────────
  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [deploy, prepare]
    environment: ${{ needs.prepare.outputs.environment }}
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Check health endpoint
        run: |
          HEALTH_URL="${{ secrets.API_BASE_URL }}/api/v1/health/ping"
          echo "Checking: $HEALTH_URL"
          for i in 1 2 3 4 5; do
            HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$HEALTH_URL" || true)
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Health check attempt $i failed (status: $HTTP_STATUS). Retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 5 attempts"
          exit 1

  # ── Deployment Summary ───────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: always()
    needs: [prepare, build-and-push, migrate, deploy, health-check]
    steps:
      - name: Print deployment summary
        run: |
          echo "=========================================="
          echo " LUMA Backend — Deployment Summary"
          echo "=========================================="
          echo "Environment : ${{ needs.prepare.outputs.environment }}"
          echo "Image Tag   : ${{ needs.build-and-push.outputs.image-tag }}"
          echo "Image Digest: ${{ needs.build-and-push.outputs.image-digest }}"
          echo "Commit      : ${{ github.sha }}"
          echo ""
          echo "Job Results:"
          echo "  Build     : ${{ needs.build-and-push.result }}"
          echo "  Migrate   : ${{ needs.migrate.result }}"
          echo "  Deploy    : ${{ needs.deploy.result }}"
          echo "  Health    : ${{ needs.health-check.result }}"
          echo "=========================================="

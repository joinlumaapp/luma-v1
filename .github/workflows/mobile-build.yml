# ─────────────────────────────────────────────────────────────
# LUMA V1 — Mobile Build Pipeline (EAS Build)
# Builds Android app bundle and optionally submits to Play Store.
# Triggered manually or on release tag.
# ─────────────────────────────────────────────────────────────
name: Mobile Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: 'Build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - preview
          - production
      submit:
        description: 'Submit to store after build'
        required: false
        default: false
        type: boolean

concurrency:
  group: mobile-build-${{ github.event.inputs.platform }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  # ── Build Android ──────────────────────────────────────
  build-android:
    name: Build Android
    if: ${{ github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: Build Android
        working-directory: apps/mobile
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile }} \
            --non-interactive
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          MIXPANEL_TOKEN: ${{ secrets.MIXPANEL_TOKEN }}
          REVENUECAT_API_KEY_ANDROID: ${{ secrets.REVENUECAT_API_KEY_ANDROID }}

  # ── Submit Android ─────────────────────────────────────
  submit-android:
    name: Submit to Google Play
    if: ${{ github.event.inputs.submit == 'true' && (github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all') }}
    needs: build-android
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: Write Google Play service account key
        working-directory: apps/mobile
        run: echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY }}' > google-services-key.json

      - name: Submit to Google Play
        working-directory: apps/mobile
        run: |
          eas submit \
            --platform android \
            --profile production \
            --non-interactive

      - name: Cleanup
        if: always()
        working-directory: apps/mobile
        run: rm -f google-services-key.json

  # ── Build iOS (for future use) ────────────────────────
  build-ios:
    name: Build iOS
    if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: Build iOS
        working-directory: apps/mobile
        run: |
          eas build \
            --platform ios \
            --profile ${{ github.event.inputs.profile }} \
            --non-interactive
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          MIXPANEL_TOKEN: ${{ secrets.MIXPANEL_TOKEN }}
          REVENUECAT_API_KEY_IOS: ${{ secrets.REVENUECAT_API_KEY_IOS }}
